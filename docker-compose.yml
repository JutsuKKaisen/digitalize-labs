services:
  postgres:
    image: postgres:16-alpine
    container_name: dl-postgres
    restart: always
    environment:
      POSTGRES_USER: dl_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dl_password}
      POSTGRES_DB: digitalize_labs
    ports:
      - "127.0.0.1:5432:5432" # Chỉ bind localhost, an toàn tuyệt đối
    volumes:
      - pgdata:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U dl_user -d digitalize_labs" ]
      interval: 10s
      timeout: 5s
      retries: 5

  python-engine:
    build:
      context: ./apps/python-engine
      dockerfile: Dockerfile
    container_name: dl-python-engine
    restart: always
    ports:
      - "127.0.0.1:8000:8000" # Internal only
    volumes:
      # KHAI BÁO DÙNG CHUNG Ổ CỨNG VỚI WEBAPP
      - uploads:/app/apps/webapp/uploads
      - mock_data:/app/apps/webapp/public/mock
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8000/docs || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3

  webapp:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: webapp
    container_name: dl-webapp
    restart: always
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - DATABASE_URL=postgresql://dl_user:${POSTGRES_PASSWORD:-dl_password}@postgres:5432/digitalize_labs
      - PYTHON_ENGINE_URL=http://python-engine:8000
      - NEXT_PUBLIC_USE_MOCK=false
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - CRON_SECRET=${CRON_SECRET:-}
    volumes:
      # KHAI BÁO DÙNG CHUNG Ổ CỨNG VỚI PYTHON ENGINE
      - uploads:/app/apps/webapp/uploads
      - mock_data:/app/apps/webapp/public/mock
    depends_on:
      postgres:
        condition: service_healthy
      python-engine:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G

  landingpage:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: landingpage
    container_name: dl-landingpage
    restart: always
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      - DATABASE_URL=postgresql://dl_user:${POSTGRES_PASSWORD:-dl_password}@postgres:5432/digitalize_labs
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

  admin:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: admin
    container_name: dl-admin
    restart: always
    ports:
      - "127.0.0.1:3002:3000"
    environment:
      - DATABASE_URL=postgresql://dl_user:${POSTGRES_PASSWORD:-dl_password}@postgres:5432/digitalize_labs
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  pgdata:
  uploads:
  mock_data:
